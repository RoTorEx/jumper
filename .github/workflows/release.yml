name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }} release binary
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            target: x86_64-unknown-linux-gnu
            archive: jumper-linux-x86_64.tar.gz
          - name: Linux aarch64
            target: aarch64-unknown-linux-gnu
            archive: jumper-linux-aarch64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${{ matrix.target }}"

      - name: Install aarch64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Package
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/jumper" dist/jumper
          tar -C dist -czf "${{ matrix.archive }}" jumper

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

      - name: Publish GitHub release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes "jumper $GITHUB_REF_NAME" \
              || gh release view "$GITHUB_REF_NAME" >/dev/null
          fi
          gh release upload "$GITHUB_REF_NAME" "${{ matrix.archive }}" --clobber
